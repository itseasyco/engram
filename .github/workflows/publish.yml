name: Publish to npm

on:
  push:
    branches: [master]
    paths-ignore:
      - "*.md"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Check if version changed
        id: version
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          NPM_VERSION=$(npm view @easylabs/engram version 2>/dev/null || echo "0.0.0")
          echo "package=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PACKAGE_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine npm tag
        if: steps.version.outputs.changed == 'true'
        id: tag
        run: |
          VERSION=$(jq -r .version package.json)
          if echo "$VERSION" | grep -qE "(alpha|beta|rc)"; then
            echo "tag=--tag alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public ${{ steps.tag.outputs.tag }}

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION="v${{ steps.version.outputs.package }}"
          PRERELEASE=""
          if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            $PRERELEASE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip (version unchanged)
        if: steps.version.outputs.changed == 'false'
        run: echo "Version ${{ steps.version.outputs.package }} already published, skipping."
